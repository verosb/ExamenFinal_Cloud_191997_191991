AWSTemplateFormatVersion: '2010-09-09'
Description: Stack Automatizacion y Escalabilidad Programada - Mayerly-Araque

Parameters:
  ALBASGStackName:
    Type: String
    Description: Nombre del stack ALB-ASG
  SecurityStackName:
    Type: String
    Description: Nombre del stack de seguridad

Resources:

  LaunchTemplateV2:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: LT-V2-Mayerly-Araque
      LaunchTemplateData:
        ImageId: ami-0c02fb55956c7d316
        InstanceType: t3.micro
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${SecurityStackName}-SGEC2Id"
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum update -y
            yum install -y httpd
            systemctl start httpd
            systemctl enable httpd
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            echo "<h1>Instancia: $INSTANCE_ID - Mayerly Araque - Version 2 Actualizada</h1>" > /var/www/html/index.html

  ScaleUpMorning:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub "${ALBASGStackName}-ASGName"
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 3
      Recurrence: "0 8 * * MON-FRI"

  ScaleUpAfternoon:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub "${ALBASGStackName}-ASGName"
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 4
      Recurrence: "0 14 * * MON-FRI"

  ScaleDownEvening:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub "${ALBASGStackName}-ASGName"
      MinSize: 1
      MaxSize: 4
      DesiredCapacity: 2
      Recurrence: "0 20 * * MON-FRI"

  ScaleDownNight:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub "${ALBASGStackName}-ASGName"
      MinSize: 1
      MaxSize: 2
      DesiredCapacity: 1
      Recurrence: "0 0 * * *"

Outputs:
  LaunchTemplateV2Id:
    Description: ID del Launch Template Version 2
    Value: !Ref LaunchTemplateV2
    Export:
      Name: !Sub "${AWS::StackName}-LTV2Id"

  ScaleUpMorningAction:
    Description: Accion programada de incremento manana
    Value: !Ref ScaleUpMorning

  ScaleUpAfternoonAction:
    Description: Accion programada de incremento tarde
    Value: !Ref ScaleUpAfternoon

  ScaleDownEveningAction:
    Description: Accion programada de reduccion tarde-noche
    Value: !Ref ScaleDownEvening

  ScaleDownNightAction:
    Description: Accion programada de reduccion noche
    Value: !Ref ScaleDownNight
