AWSTemplateFormatVersion: '2010-09-09'
Description: Stack EC2 Estatica con Elastic IP - Veronica-Sanchez

Parameters:
  SubnetPublicId:
    Type: AWS::EC2::Subnet::Id
    Description: ID de la subred publica
  SecurityStackName:
    Type: String
    Description: Nombre del stack de seguridad
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Nombre del Key Pair para SSH

Resources:

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316
      InstanceType: t2.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref SubnetPublicId
      SecurityGroupIds:
        - Fn::ImportValue: !Sub "${SecurityStackName}-SGEC2Id"
      Tags:
        - Key: Name
          Value: EC2-Veronica-Sanchez
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hola desde EC2 - Veronica Sanchez</h1>" > /var/www/html/index.html

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EIP-Veronica-Sanchez

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref EC2Instance
      EIP: !Ref ElasticIP

Outputs:
  InstanceId:
    Description: ID de la instancia EC2
    Value: !Ref EC2Instance
    Export:
      Name: !Sub "${AWS::StackName}-InstanceId"

  ElasticIPAddress:
    Description: Direccion IP publica estatica
    Value: !Ref ElasticIP
    Export:
      Name: !Sub "${AWS::StackName}-ElasticIP"

  WebsiteURL:
    Description: URL del sitio web
    Value: !Sub "http://${ElasticIP}"
