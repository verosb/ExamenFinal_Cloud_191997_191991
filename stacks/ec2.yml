AWSTemplateFormatVersion: '2010-09-09'
Description: Stack EC2 Estatica - Veronica Sanchez

Parameters:
  SubnetId:
    Type: String

Resources:

  InstanciaVeronicaSanchez:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !ImportValue SGEc2VeronicaSanchez
      Tags:
        - Key: Name
          Value: EC2-Veronica-Sanchez
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Hola desde EC2 - Veronica Sanchez</h1>" > /var/www/html/index.html

  ElasticIPVeronicaSanchez:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: EIP-Veronica-Sanchez

  AsociacionEIP:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref InstanciaVeronicaSanchez
      EIP: !Ref ElasticIPVeronicaSanchez

Outputs:
  InstanciaId:
    Description: ID de la instancia EC2
    Value: !Ref InstanciaVeronicaSanchez

  DireccionEIP:
    Description: Elastic IP publica
    Value: !Ref ElasticIPVeronicaSanchez